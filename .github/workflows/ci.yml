name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest

  dbt-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dbt project files
        run: |
          test -f dbt/finance_lakehouse/dbt_project.yml
          test -f dbt/finance_lakehouse/models/schema.yml
