version: 2

models:
  - name: stg_market_data
    description: Standardized market data from Bronze ingestion.
    columns:
      - name: symbol
        tests:
          - not_null
          - unique
      - name: close_price
        tests:
          - not_null
      - name: trade_volume
        tests:
          - not_null
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values: ['market_api']
      - name: extracted_at
        tests:
          - not_null

  - name: stg_sec_submissions
    description: Standardized SEC submission metadata from Bronze ingestion.
    columns:
      - name: cik
        tests:
          - not_null
          - unique
      - name: ticker
        tests: [not_null]
      - name: filing_url
        tests:
          - not_null
          - unique
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values: ['sec_submissions']
      - name: extracted_at
        tests:
          - not_null

  - name: int_security_latest_snapshot
    description: Joined market and SEC coverage snapshot.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: close_price
        tests: [not_null]
      - name: trade_volume
        tests: [not_null]
      - name: market_extracted_at
        tests: [not_null]
      - name: latest_filing_at
        tests: []

  - name: gold_security_master
    description: Curated Gold mart for analytics-ready security coverage.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: close_price
        tests: [not_null]
      - name: trade_volume
        tests: [not_null]
      - name: market_extracted_at
        tests: [not_null]
      - name: latest_filing_at
        tests: []
      - name: coverage_status
        tests:
          - not_null
          - accepted_values:
              values: ['market_only', 'market_and_sec']

  - name: int_security_enriched
    description: Security master enriched with reference attributes from the tracked universe.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: company_name
        tests: [not_null]
      - name: sector
        tests: [not_null]
      - name: primary_exchange
        tests: [not_null]
      - name: asset_class
        tests: [not_null]
      - name: country_code
        tests: [not_null]
      - name: currency_code
        tests: [not_null]
      - name: region
        tests: [not_null]
      - name: industry_group
        tests: [not_null]
      - name: close_price
        tests: [not_null]
      - name: trade_volume
        tests: [not_null]
      - name: market_extracted_at
        tests: [not_null]
      - name: coverage_status
        tests:
          - not_null
          - accepted_values:
              values: ['market_only', 'market_and_sec']

  - name: gold_security_coverage_summary
    description: Aggregated coverage metrics for downstream reporting.
    columns:
      - name: sector
        tests: [not_null]
      - name: region
        tests: [not_null]
      - name: coverage_status
        tests:
          - not_null
          - accepted_values:
              values: ['market_only', 'market_and_sec']
      - name: security_count
        tests: [not_null]
      - name: total_trade_volume
        tests: [not_null]
      - name: average_close_price
        tests: [not_null]
      - name: latest_market_extract_at
        tests: [not_null]
