version: 2

seeds:
  - name: market_data
    description: Local Bronze bootstrap seed for DuckDB source testing.
    columns:
      - name: symbol
        tests: [not_null]
      - name: close_price
        tests: [not_null]
      - name: trade_volume
        tests: [not_null]
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['market_api']
      - name: extracted_at
        tests: [not_null]
  - name: sec_submissions
    description: Local Bronze bootstrap seed for DuckDB source testing.
    columns:
      - name: cik
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: filing_url
        tests: [not_null]
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['sec_submissions']
      - name: extracted_at
        tests: [not_null]
  - name: security_universe
    description: Canonical tracked security universe.
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
      - name: company_name
        tests:
          - not_null
      - name: sector
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Information Technology']
      - name: is_active
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['true']
      - name: primary_exchange
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['NASDAQ']
      - name: asset_class
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Equity']
      - name: country_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['US']
      - name: currency_code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['USD']
      - name: listing_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['listed']
      - name: security_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Common Stock']
      - name: issuer_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Operating Company']
      - name: region
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['North America']
      - name: industry_group
        tests:
          - not_null
